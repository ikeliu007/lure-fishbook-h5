<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电子鱼护 · 路亚图鉴</title>
<style>
/* ===== 全局 ===== */
/* 应用版本 stamp (1.0.1) - 请随更新递增，防止浏览器缓存 */
window.APP_VERSION = '1.0.2-20260309';
// AI_ENDPOINT: 若设置，AI 识别请求发到此地址（默认同源）
// 可在 VPS 部署时由 server.js 注入，避免大图通过 SSH 隧道中转
window.AI_ENDPOINT = window.AI_ENDPOINT || window.location.origin;
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#111120;--bg4:#0d0d20;
  --accent:#00d4ff;--accent2:#0099cc;
  --c1:#888;--c2:#4CAF50;--c3:#9C27B0;--c4:#FF9800;
  --text:#fff;--text2:#ccc;--text3:#888;--text4:#555;
  --border:#2a2a3e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}

/* ===== 页面容器 ===== */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding-bottom:60px}
.page.active{display:block}

/* ===== TabBar ===== */
.tabbar{height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;transition:.2s}
.tab-icon{font-size:22px;filter:grayscale(1) brightness(.5);transition:.2s}
.tab-label{font-size:10px;color:var(--text4);transition:.2s}
.tab-item.active .tab-icon{filter:none}
.tab-item.active .tab-label{color:var(--accent)}

/* ===== 广场 ===== */
#page-community{}
.community-header{padding:16px 14px 8px;font-size:18px;font-weight:700;color:var(--accent)}
.post-card{background:var(--bg2);border-radius:12px;margin:6px 10px;padding:14px;overflow:hidden}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3);flex-shrink:0}
.username{font-size:14px;font-weight:700;color:var(--text)}
.post-time{font-size:11px;color:var(--text4)}
.level-tag{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid currentColor;margin-left:auto;flex-shrink:0}
.lv1{color:var(--c1)}.lv2{color:var(--c2)}.lv3{color:var(--c3)}.lv4{color:var(--c4)}
.post-fish-name{font-size:16px;font-weight:700;margin-bottom:4px}
.post-metrics{font-size:13px;color:var(--text3);margin-bottom:6px}
.post-lure{display:inline-block;font-size:11px;color:var(--accent);background:#003344;padding:2px 8px;border-radius:8px;margin-bottom:8px}
.post-note{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.post-photo{width:100%;border-radius:8px;max-height:240px;object-fit:cover;display:block;margin-bottom:10px}
.post-photo-empty{width:100%;height:80px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.3;margin-bottom:10px}
.action-bar{display:flex;gap:20px;padding-top:10px;border-top:1px solid var(--border)}
.action-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text4);cursor:pointer;transition:.2s}
.action-btn.liked{color:#ff6b6b}
.action-btn:active{opacity:.7}

/* ===== 图鉴 ===== */
.fishbook-header{padding:14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.fishbook-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:10px}
.progress-bar-wrap{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px;transition:.5s}
.progress-text{font-size:11px;color:var(--text3);margin-top:4px}
.cat-tabs{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;background:var(--bg2)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:5px 14px;border-radius:20px;font-size:13px;border:1px solid var(--border);color:var(--text3);cursor:pointer;white-space:nowrap;transition:.2s}
.cat-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.fish-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.fish-card{background:var(--bg2);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;border:1px solid var(--border)}
.fish-card:active{transform:scale(.96)}
.fish-card.unlocked{border-color:transparent}
/* 评级发光边框 */
.fish-card.lv1{border-color:#2979FF44;box-shadow:0 0 8px #2979FF33}
.fish-card.lv2{border-color:#E91E8C55;box-shadow:0 0 12px #E91E8C44}
.fish-card.lv3{border-color:#FFD60066;box-shadow:0 0 16px #FFD60055;animation:glowS 2s ease-in-out infinite}
.fish-card.lv4{border-color:#E0F7FA88;box-shadow:0 0 20px #E0F7FA77;animation:glowSSS 2s ease-in-out infinite}
@keyframes glowS{0%,100%{box-shadow:0 0 16px #FFD60055}50%{box-shadow:0 0 28px #FFD600aa}}
@keyframes glowSSS{0%,100%{box-shadow:0 0 20px #E0F7FA55,0 0 40px #E0F7FA22}50%{box-shadow:0 0 32px #E0F7Facc,0 0 60px #E0F7Fa44}}
.fish-icon{font-size:40px;margin-bottom:6px;display:block;transition:.3s;position:relative;z-index:1}
.fish-card.locked .fish-icon{filter:grayscale(1) brightness(.35)}
.fish-name{font-size:11px;color:var(--text2);line-height:1.3;position:relative;z-index:1}
.fish-card.locked .fish-name{color:var(--text4)}
.lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:10;pointer-events:none;opacity:.85}
.level-badge{position:absolute;bottom:4px;right:4px;font-size:9px;font-weight:700}
.level-badge.lv1{color:var(--c1)}.level-badge.lv2{color:var(--c2)}.level-badge.lv3{color:var(--c3)}.level-badge.lv4{color:var(--c4)}

/* ===== 记录 ===== */
.record-form{padding:14px}
.form-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--text3);margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* fish-picker old removed */




.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:.2s}
.submit-btn:active{transform:scale(.98);opacity:.9}

/* ===== 我的 ===== */
.profile-hero{background:linear-gradient(135deg,var(--bg2),#003366);padding:24px 16px;display:flex;align-items:center;gap:14px}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid var(--accent)}
.profile-name{font-size:20px;font-weight:700}
.profile-sub{font-size:12px;color:var(--accent);margin-top:3px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);margin:10px;background:var(--bg2);border-radius:12px;overflow:hidden}
.stat-block{padding:16px;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat-num{font-size:26px;font-weight:700;color:var(--accent);display:block}
.stat-label{font-size:11px;color:var(--text4);margin-top:2px}
.section-title{font-size:15px;font-weight:700;color:var(--accent);padding:12px 14px 6px}
.record-list-item{background:var(--bg2);border-radius:8px;margin:4px 10px;padding:11px 13px;display:flex;align-items:center}
.rli-left{flex:1}
.rli-fish{font-size:15px;font-weight:700;margin-bottom:3px}
.rli-detail{font-size:12px;color:var(--text4)}
.rli-level{font-size:13px;font-weight:700}
.empty-tip{text-align:center;padding:40px 20px;color:var(--text4);font-size:14px}

/* ===== 鱼种详情弹窗 ===== */
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:100;display:none;align-items:flex-end;animation:fadeIn .2s}
.modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-fish-icon{font-size:64px;text-align:center;margin-bottom:10px}
.modal-fish-name{font-size:22px;font-weight:700;text-align:center}
.modal-fish-en{font-size:13px;color:var(--text4);text-align:center;margin-bottom:14px}
.modal-info-row{display:flex;gap:8px;margin-bottom:8px}
.modal-info-label{font-size:12px;color:var(--text4);width:52px;flex-shrink:0}
.modal-info-val{font-size:13px;color:var(--text2)}
.modal-region-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.region-tag{font-size:11px;background:var(--bg3);border-radius:6px;padding:2px 8px;color:var(--text3)}
.modal-levels{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.modal-level-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.modal-level-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.modal-close-btn{width:100%;padding:12px;background:var(--bg3);border:none;color:var(--text3);border-radius:10px;font-size:15px;cursor:pointer;margin-top:14px}

/* ===== 解锁动画 ===== */
.unlock-overlay{position:fixed;inset:0;background:#000c;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.unlock-overlay.show{display:flex}
.unlock-card{background:var(--bg2);border-radius:20px;padding:30px;text-align:center;max-width:300px;width:90%;position:relative;overflow:hidden}
.unlock-icon{font-size:80px;margin-bottom:10px;animation:bounceIn .5s}
@keyframes bounceIn{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.unlock-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:6px}
.unlock-sub{font-size:14px;color:var(--text3);margin-bottom:4px}
.unlock-level{font-size:16px;font-weight:700;margin-bottom:20px}
.unlock-close{padding:12px 32px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-size:15px;font-weight:700;border:none;border-radius:30px;cursor:pointer}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float 1.2s ease-out forwards}
@keyframes float{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(0)}}

/* ===== 滚动 ===== */
::-webkit-scrollbar{width:0;height:0}

/* ===== 鱼种详情 Modal ===== */
.detail-header{display:flex;align-items:center;gap:12px;padding:4px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
.detail-icon{font-size:52px;flex-shrink:0;line-height:1}
.detail-names{flex:1;min-width:0}
.detail-name{font-size:20px;font-weight:800;color:var(--text1)}
.detail-en{font-size:12px;color:var(--text4);margin-top:2px}
.detail-cur-grade{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;letter-spacing:-0.5px}
.detail-meta-row{display:flex;gap:0;margin-bottom:12px;background:var(--bg3);border-radius:10px;overflow:hidden}
.detail-meta-item{flex:1;padding:8px 6px;text-align:center;border-right:1px solid var(--border)}
.detail-meta-item:last-child{border-right:none}
.meta-label{font-size:10px;color:var(--text4);margin-bottom:3px}
.meta-val{font-size:12px;color:var(--text2);font-weight:600}
.detail-best{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:8px;padding:8px 12px;margin-bottom:12px}
.best-label{font-size:12px;color:var(--text4)}
.best-val{font-size:14px;font-weight:800}
.detail-section{margin-bottom:14px}
.detail-stitle{font-size:12px;color:var(--text4);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.detail-desc{font-size:13px;color:var(--text2);line-height:1.7;background:var(--bg3);border-radius:8px;padding:10px 12px}
.detail-dist{display:flex;flex-wrap:wrap;gap:5px}
.dist-tag{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text3)}
.dist-todo{color:#555;border-color:#333}
.detail-lure-tags{display:flex;flex-wrap:wrap;gap:6px}
.lure-tag{font-size:12px;background:#0d2035;border:1px solid #1a4a7a;border-radius:6px;padding:4px 10px;color:#5599cc}
.detail-grade-hint{font-size:11px;color:#555;margin-bottom:8px}
.detail-grades{display:flex;flex-direction:column;gap:6px}
.detail-grade-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;border:1.5px solid #2a2a2a;transition:border-color .2s}
.detail-grade-row.grade-reached{background:var(--bg2)}
.grade-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;letter-spacing:-0.5px}
.grade-info{flex:1}
.grade-name{font-size:13px;font-weight:700}
.grade-cond{font-size:11px;margin-top:1px}
.grade-check{font-size:16px;font-weight:700;flex-shrink:0}

.grade-pill{position:absolute;top:5px;right:5px;font-size:10px;font-weight:900;border:1.5px solid;border-radius:5px;padding:2px 6px;background:#000000cc;letter-spacing:-.3px;text-shadow:0 0 6px currentColor}
.fish-card.locked{border-color:#222}
.fish-card.locked .fish-icon{filter:grayscale(1) brightness(.25)}
.fish-card.locked .fish-name{color:#333}
/* lock-overlay defined above */

/* ===== 解锁弹窗新样式 ===== */
.unlock-grade-ring{width:70px;height:70px;border-radius:50%;border:3px solid #2979FF;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;box-shadow:0 0 20px #2979FF88}
.unlock-grade-label{font-size:22px;font-weight:900;letter-spacing:-1px}
.unlock-fish-name{font-size:20px;font-weight:800;margin-bottom:4px;color:#fff}
.unlock-size-row{font-size:14px;color:#888;margin-bottom:6px;min-height:20px}
.unlock-grade-desc{font-size:13px;font-weight:600;margin-bottom:16px;min-height:18px}
.unlock-close{background:#ffffff11;border:1px solid #ffffff33;color:#fff;border-radius:10px;padding:10px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%}

/* ===== 记录表单升级 ===== */
.required{color:#f66;font-size:11px}
.form-hint{font-size:10px;color:#555;margin-left:4px}
.photo-upload-area{background:var(--bg2);border:2px dashed var(--border);border-radius:12px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
.photo-upload-area:active{opacity:.8}
.photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.photo-placeholder-icon{font-size:40px}
.photo-placeholder-text{font-size:13px;color:#555}
.photo-preview-img{width:100%;max-height:360px;object-fit:contain;border-radius:10px;display:block;background:#000;cursor:zoom-in}
.photo-change-hint{position:absolute;bottom:0;left:0;right:0;background:#000a;color:#fff;font-size:12px;text-align:center;padding:6px}
.location-row{display:flex;gap:8px;align-items:center}
.location-input{flex:1}
.locate-btn{width:44px;height:44px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.location-status{font-size:11px;margin-top:4px;min-height:16px}
.share-location-row{display:flex;align-items:center;justify-content:space-between;background:#0a1f0a;border:1px solid #1a4a1a;border-radius:8px;padding:10px 12px;margin-top:8px}
.share-location-info{flex:1}
.share-location-title{font-size:12px;color:#4CAF50;font-weight:600}
.share-location-sub{font-size:11px;color:#555;margin-top:2px;font-family:monospace}
.share-location-tip{font-size:11px;color:#888;margin-top:6px;padding:0 2px}
/* Toggle开关 */
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#333;border-radius:24px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#888;border-radius:50%;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:#1a4a1a}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px);background:#4CAF50}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 广场帖子照片 */
.post-photo{width:100%;border-radius:10px;margin:8px 0;object-fit:contain;display:block;background:#000;cursor:zoom-in;max-height:480px}

/* ===== 鱼种搜索下拉 ===== */
.fish-select-wrap{position:relative}
.fish-select-box{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;min-height:46px;gap:8px;transition:.2s}
.fish-select-box:active{opacity:.8}
.fish-select-val{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.fish-select-placeholder{color:#555;font-size:14px}
.fish-select-icon{font-size:22px;flex-shrink:0}
.fish-select-name{font-size:14px;font-weight:600;color:var(--text1)}
.fish-select-en{font-size:11px;color:var(--text4);margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fish-select-arrow{color:#555;font-size:14px;flex-shrink:0;transition:transform .2s}
.fish-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;z-index:100;display:flex;flex-direction:column;max-height:360px;overflow:hidden;box-shadow:0 8px 32px #0009}
.fish-search-wrap{position:relative;padding:10px 10px 6px;border-bottom:1px solid var(--border);flex-shrink:0}
.fish-search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 32px 8px 10px;color:var(--text1);font-size:14px;outline:none;box-sizing:border-box}
.fish-search-input:focus{border-color:var(--accent)}
.fish-search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:14px;margin-top:4px;pointer-events:none}
.fish-dropdown-list{overflow-y:auto;flex:1;min-height:0}
.fish-dd-letter{padding:6px 12px 2px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;background:var(--bg3);position:sticky;top:0;z-index:1}
.fish-dd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid #ffffff08;transition:.15s}
.fish-dd-item:active,.fish-dd-item:hover{background:var(--bg3)}
.fish-dd-selected{background:#003344!important}
.fish-dd-icon{font-size:22px;flex-shrink:0}
.fish-dd-names{flex:1;min-width:0}
.fish-dd-cn{font-size:14px;color:var(--text1);display:block}
.fish-dd-en{font-size:11px;color:var(--text4);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fish-dd-cat{font-size:10px;font-weight:700;flex-shrink:0;width:18px;text-align:center}
.fish-dd-check{color:var(--accent);font-size:14px;font-weight:700;flex-shrink:0}
.fish-dd-empty{padding:20px;text-align:center;color:#555;font-size:13px}

/* ===== AI 鱼种识别面板 ===== */
.photo-placeholder-sub{font-size:11px;color:#444;margin-top:-2px}
.ai-recog-panel{margin-top:8px;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border)}
.ai-recog-status{display:flex;align-items:center;gap:10px;padding:12px 14px}
.ai-spin{font-size:16px;animation:aiSpin 1.2s linear infinite;display:inline-block}
@keyframes aiSpin{to{transform:rotate(360deg)}}
#ai-status-text{font-size:13px;color:#888}
.ai-recog-results{padding:12px 14px}
.ai-result-title{font-size:11px;color:var(--text4);font-weight:700;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.ai-result-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.ai-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:.15s}
.ai-result-item:active{opacity:.75}
.ai-result-top{border-color:var(--accent)55}
.ai-result-icon{font-size:26px;flex-shrink:0}
.ai-result-info{flex:1;min-width:0}
.ai-result-name{font-size:14px;font-weight:700;color:var(--text1)}
.ai-result-en{font-size:11px;color:var(--text4)}
.ai-result-reason{font-size:11px;color:#555;margin-top:2px}
.ai-result-conf{text-align:right;flex-shrink:0;min-width:44px}
.ai-conf-num{font-size:16px;font-weight:800;line-height:1}
.ai-conf-label{font-size:10px;color:#666;margin-top:1px}
.ai-result-desc{font-size:11px;color:#555;line-height:1.6;padding-top:6px;border-top:1px solid var(--border)}
.ai-no-result{color:#555;font-size:13px;padding:10px 0;text-align:center}
.ai-retry-btn{margin-top:10px;background:transparent;border:1px solid var(--border);color:#666;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;width:100%}

/* ===== 参照物提示 ===== */
.photo-ref-hint{margin-top:8px;width:100%}
.photo-ref-title{font-size:11px;color:#556;margin-bottom:6px;text-align:center}
.photo-ref-items{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.ref-tag{font-size:11px;background:#111c26;border:1px solid #1a3040;color:#4a8a9a;border-radius:10px;padding:3px 8px}
/* ===== AI体长估算卡片 ===== */
.ai-size-card{margin-top:10px;background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid #1a3a2a}
.ai-size-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ai-size-icon{font-size:14px}
.ai-size-label{font-size:11px;color:#4a8a6a;font-weight:700;flex:1;letter-spacing:.5px}
.ai-size-conf{font-size:10px;font-weight:600}
.ai-size-main{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.ai-size-num{font-size:28px;font-weight:800;color:#4CAF50;line-height:1}
.ai-size-unit{font-size:13px;color:#4CAF50;font-weight:600}
.ai-size-range{font-size:11px;color:#666;margin-left:4px}
.ai-size-na{font-size:14px;color:#555}
.ai-size-method{font-size:11px;color:#555;line-height:1.5}
.ai-size-apply-btn{margin-top:8px;width:100%;background:linear-gradient(90deg,#1a4a2a,#1a5a30);border:1px solid #2a7a40;color:#4CAF50;border-radius:6px;padding:7px;font-size:13px;font-weight:600;cursor:pointer}
.ai-size-apply-btn:active{opacity:.8}

/* ===== 拍照/相册按钮 ===== */
.photo-btn-row{display:flex;gap:10px;justify-content:center;margin:4px 0}
.photo-btn-camera,.photo-btn-album{flex:1;padding:10px 0;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:.2s}
.photo-btn-camera{background:linear-gradient(135deg,#0d2a3a,#0a1f2e);border:1.5px solid #1a5a7a;color:#00d4ff}
.photo-btn-album{background:linear-gradient(135deg,#1a2a0d,#111f0a);border:1.5px solid #3a6a1a;color:#7ae040}
.photo-btn-camera:active,.photo-btn-album:active{opacity:.7}
.photo-placeholder-hint{font-size:12px;color:#445;margin-top:2px}

/* ===== Lightbox 全屏查看 ===== */
.lightbox{display:none;position:fixed;inset:0;background:#000d;z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lightbox-img{max-width:100%;max-height:calc(100vh - 80px);object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;font-size:24px;color:#fff;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#fff2;border-radius:50%}
.lightbox-hint{position:absolute;bottom:20px;font-size:12px;color:#888}
.lb-in{animation:lbFadeIn .2s ease}
@keyframes lbFadeIn{from{opacity:0}to{opacity:1}}

/* ===== 鱼种确认卡 ===== */
.fish-confirmed-card{background:linear-gradient(135deg,#0a1f1a,#061510);border:1.5px solid #1a5a3a;border-radius:12px;padding:14px;margin-top:8px}
.fish-confirmed-body{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.fish-confirmed-icon{font-size:36px;flex-shrink:0}
.fish-confirmed-info{flex:1;min-width:0}
.fish-confirmed-name{font-size:18px;font-weight:800;color:#fff}
.fish-confirmed-en{font-size:12px;color:#888;margin-top:1px}
.fish-confirmed-badge{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.fish-confirmed-ai-tag{font-size:10px;background:#0d3a25;border:1px solid #1a5a35;color:#4CAF50;border-radius:10px;padding:2px 8px;font-weight:600}
.fish-confirmed-conf{text-align:right;flex-shrink:0}
.fish-wrong-btn{width:100%;background:transparent;border:1px solid #1a3a2a;color:#4a7a5a;border-radius:8px;padding:8px;font-size:13px;cursor:pointer}
.fish-wrong-btn:active{background:#0a2015}
/* ===== 候选列表标题 ===== */
.ai-candidates-sub{font-size:10px;color:#555;font-weight:400;margin-left:6px}
/* ===== 手动选择入口 ===== */
.manual-picker-title{font-size:12px;color:#888;margin-bottom:6px;padding-top:8px;border-top:1px solid var(--border)}
/* ===== 无照片时的手动入口 ===== */
.no-photo-picker{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:8px 12px;background:var(--bg2);border-radius:8px;border:1px dashed var(--border)}
.no-photo-picker-tip{font-size:12px;color:#555}
.no-photo-picker-btn{font-size:12px;color:var(--accent);background:transparent;border:1px solid var(--accent)55;border-radius:6px;padding:5px 10px;cursor:pointer}
/* ===== AI动作区 ===== */
.ai-recog-actions{margin-top:8px}

/* ===== AI推荐区（下拉顶部） ===== */
.fish-ai-suggest{border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a1f14,var(--bg2))}
.fish-ai-suggest-title{padding:8px 12px 4px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#4a8a5a}
#fish-ai-suggest-status{color:#4a8a5a}
.fish-ai-item{background:#0a1f14!important;border-left:3px solid #2a7a4a!important}
.fish-ai-item:hover,.fish-ai-item:active{background:#0d2a1a!important}
.fish-ai-conf{font-size:13px;font-weight:800;flex-shrink:0;min-width:36px;text-align:right}
.fish-ai-suggest-divider{text-align:center;font-size:10px;color:#333;padding:6px 0;border-top:1px solid var(--border)}
/* ===== 状态条（轻量） ===== */
.ai-status-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:0 0 8px 8px;border:1px solid var(--border);border-top:none;font-size:12px;color:#888}

/* ===== 鱼种下拉 AI 匹配度标注 ===== */
.fish-dd-conf-tag{font-size:13px;font-weight:800;flex-shrink:0;min-width:38px;text-align:right;padding-right:2px}

/* ===== AI 体重推算 ===== */
.ai-weight-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;color:#aaa}
.ai-weight-val{font-size:15px;font-weight:800;color:#FFD600}
.ai-wt-btn{background:linear-gradient(135deg,#1a1400,#2d2200)!important;border-color:#FFD60055!important;color:#FFD600!important}
.ai-size-apply-row{margin-top:4px}
.fish-select-ai-badge{font-size:10px;font-weight:800;color:#00d4ff;background:#00d4ff18;border:1px solid #00d4ff44;border-radius:4px;padding:1px 5px;margin-left:4px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app">
  <div class="pages">

    <!-- ===== 广场 ===== -->
    <div class="page active" id="page-community">
      <div class="community-header">🌊 钓鱼广场</div>
      <div id="post-list"></div>
    </div>

    <!-- ===== 图鉴 ===== -->
    <div class="page" id="page-fishbook">
      <div class="fishbook-header">
        <div class="fishbook-title">🐟 鱼种图鉴</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text">已解锁 0 / 0 种</div>
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="fish-grid" id="fish-grid"></div>
    </div>

    <!-- ===== 记录 ===== -->
    <div class="page" id="page-record">
      <div class="record-form">
        <div class="form-title">🎣 记录渔获</div>

        <!-- 鱼种选择（含AI推荐） -->
        <div class="form-group">
          <label class="form-label">选择鱼种 <span class="required">*</span></label>
          <div class="fish-select-wrap" id="fish-select-wrap">
            <!-- 已选显示 -->
            <div class="fish-select-box" id="fish-select-box" onclick="openFishPicker()">
              <div class="fish-select-val" id="fish-select-val">
                <span class="fish-select-placeholder">点击选择鱼种...</span>
              </div>
              <span class="fish-select-arrow" id="fish-select-arrow">▾</span>
            </div>
            <!-- 下拉面板 -->
            <div class="fish-dropdown" id="fish-dropdown" style="display:none">
              <!-- AI推荐区（上传照片识别后注入） -->
              <div class="fish-ai-suggest" id="fish-ai-suggest" style="display:none">
                <div class="fish-ai-suggest-title">
                  <span id="fish-ai-suggest-status">🤖 AI 识别中...</span>
                </div>
                <div class="fish-ai-suggest-list" id="fish-ai-suggest-list"></div>
                <div class="fish-ai-suggest-divider">— 全部鱼种 —</div>
              </div>
              <!-- 搜索框 -->
              <div class="fish-search-wrap">
                <input class="fish-search-input" id="fish-search-input" type="text"
                  placeholder="搜索中文名或英文名..." oninput="filterFishList(this.value)"
                  autocomplete="off">
                <span class="fish-search-icon">🔍</span>
              </div>
              <div class="fish-dropdown-list" id="fish-dropdown-list"></div>
            </div>
          </div>
        </div>

        <!-- 鱼获照片 -->
        <div class="form-group">
          <label class="form-label">鱼获照片 <span class="required">*</span> <span class="form-hint">上传后AI自动识别鱼种·估算体长</span></label>
          <input type="file" id="input-photo" accept="image/*" style="display:none" onchange="onPhotoSelected(this)">
          <div class="photo-upload-area" id="photo-upload-area" onclick="document.getElementById('input-photo').click()">
            <div class="photo-placeholder" id="photo-placeholder">
              <div class="photo-placeholder-icon">📸</div>
              <div class="photo-placeholder-text">点击上传鱼获照片</div>
              <div class="photo-placeholder-hint">可拍照 或 选择本地相册</div>
              <div class="photo-ref-hint">
                <div class="photo-ref-title">📏 放参照物可提升体长估算精度</div>
                <div class="photo-ref-items">
                  <span class="ref-tag">🎣 鱼竿</span>
                  <span class="ref-tag">🪝 渔轮</span>
                  <span class="ref-tag">🍶 水瓶</span>
                  <span class="ref-tag">📦 烟盒</span>
                  <span class="ref-tag">📏 直尺</span>
                </div>
              </div>
            </div>
            <img id="photo-preview" class="photo-preview-img" style="display:none" alt="鱼获照片" onclick="event.stopPropagation();openLightbox(this.src)">
            <div class="photo-change-hint" id="photo-change-hint" style="display:none">点击更换照片</div>
          </div>
          <!-- AI识别状态条（轻量，不占主位） -->
          <div class="ai-status-bar" id="ai-status-bar" style="display:none">
            <span class="ai-spin">⏳</span>
            <span id="ai-status-text">正在识别鱼种...</span>
          </div>
        </div>

        <!-- 体长体重 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">体长 (cm) <span class="required">*</span></label>
            <input class="form-input" type="number" id="input-length" placeholder="如：45">
          </div>
          <div class="form-group">
            <label class="form-label">体重 (kg)</label>
            <input class="form-input" type="number" id="input-weight" step="0.1" placeholder="如：2.5">
          </div>
        </div>

        <!-- 坐标定位 -->
        <div class="form-group">
          <label class="form-label">钓点坐标</label>
          <div class="location-row">
            <input class="form-input location-input" type="text" id="input-location" placeholder="手动输入地名 或 点击定位">
            <button class="locate-btn" id="locate-btn" onclick="getLocation()" title="自动定位">📍</button>
          </div>
          <div class="location-status" id="location-status"></div>
          <!-- 坐标分享开关 -->
          <div class="share-location-row" id="share-location-row" style="display:none">
            <div class="share-location-info">
              <div class="share-location-title">📍 已获取精确坐标</div>
              <div class="share-location-sub" id="coords-display"></div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="share-coords-toggle" onchange="onShareCoordsToggle(this)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="share-location-tip" id="share-location-tip" style="display:none">
            ⚠️ 关闭后仅记录地名，精确钓点坐标不会对外分享
          </div>
        </div>

        <!-- 钓法备注 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">使用路亚</label>
            <input class="form-input" type="text" id="input-lure" placeholder="如：铅笔饵">
          </div>
          <div class="form-group">
            <label class="form-label">备注</label>
            <input class="form-input" type="text" id="input-note" placeholder="这条鱼的故事...">
          </div>
        </div>

        <button class="submit-btn" onclick="submitRecord()">🏆 提交渔获</button>
      </div>
    </div>

    <!-- ===== 我的 ===== -->
    <div class="page" id="page-profile">
      <div class="profile-hero">
        <div class="profile-avatar">🎣</div>
        <div>
          <div class="profile-name">钓鱼爱好者</div>
          <div class="profile-sub">电子鱼护持有者</div>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">🏆 最近渔获</div>
      <div id="record-list"></div>
    </div>
  </div>

  <!-- TabBar -->
  <div class="tabbar">
    <div class="tab-item active" onclick="switchTab('community',this)">
      <span class="tab-icon">🌊</span><span class="tab-label">广场</span>
    </div>
    <div class="tab-item" onclick="switchTab('fishbook',this)">
      <span class="tab-icon">🐟</span><span class="tab-label">图鉴</span>
    </div>
    <div class="tab-item" onclick="switchTab('record',this)">
      <span class="tab-icon">🎣</span><span class="tab-label">记录</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile',this)">
      <span class="tab-icon">👤</span><span class="tab-label">我的</span>
    </div>
  </div>
</div>

<!-- 鱼种详情弹窗 -->
<div class="modal-overlay" id="fish-modal" onclick="closeFishModal(event)">
  <div class="modal-sheet" id="fish-modal-content"></div>
</div>

<!-- 解锁动画 -->
<div class="unlock-overlay" id="unlock-overlay">
  <div class="unlock-card" id="unlock-card">
    <div class="particles" id="particles"></div>
    <div class="unlock-grade-ring" id="unlock-grade-ring">
      <div class="unlock-grade-label" id="unlock-grade-label">B</div>
    </div>
    <div class="unlock-icon" id="unlock-icon">🐟</div>
    <div class="unlock-title" id="unlock-title"></div>
    <div class="unlock-fish-name" id="unlock-fish-name"></div>
    <div class="unlock-size-row" id="unlock-size-row"></div>
    <div class="unlock-grade-desc" id="unlock-grade-desc"></div>
    <button class="unlock-close" id="unlock-close-btn" onclick="closeUnlock()">太棒了！</button>
  </div>
</div>

<script>
// ===================================================================
// 鱼种数据库（精选40种，涵盖三类）
// ===================================================================
const FISH_DB = [

function calcLevel(fish, length){
  // 返回 1=B, 2=A, 3=S, 4=SSS
  if(!length || length <= 0) return 1;
  const t = fish.t;
  if(length >= t.lv4) return 4; // SSS
  if(length >= t.lv3) return 3; // S
  if(length >= t.lv2) return 2; // A
  return 1;                      // B（幼年期，最小）
}

function getFish(id){ return FISH_DB.find(f=>f.id===id); }

function timeAgo(ms){
  const d = Date.now()-ms;
  if(d<60000) return '刚刚';
  if(d<3600000) return Math.floor(d/60000)+'分钟前';
  if(d<86400000) return Math.floor(d/3600000)+'小时前';
  return Math.floor(d/86400000)+'天前';
}

function switchTab(name, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='fishbook') renderFishbook();
  if(name==='community') renderCommunity();
  if(name==='profile') renderProfile();
  if(name==='record') renderFishPicker();
}

  if(!state.posts.length){list.innerHTML='<div class="empty-tip">还没有帖子，去钓一条吧！</div>';return;}
  list.innerHTML = state.posts.map((p,i)=>`
    <div class="post-card">
      <div class="post-header">
        <div class="avatar">${p.avatar||'👤'}</div>
        <div><div class="username">${p.user}</div><div class="post-time">${p.time||timeAgo(p.ts||Date.now())}</div></div>
        <span class="level-tag lv${p.level}" style="color:${LEVEL_COLORS[p.level]};border-color:${LEVEL_COLORS[p.level]}">${LEVEL_NAMES[p.level]}</span>
      </div>
      <div class="post-fish-name">${p.fishName}</div>
      <div class="post-metrics">${p.length?p.length+'cm':''}${p.weight?' · '+p.weight+'kg':''}</div>
      ${p.photo?'<img class="post-photo" src="'+p.photo+'" alt="鱼获照片" onclick="openLightbox(this.src)">':''}
      ${p.lure?`<div class="post-lure">🪝 ${p.lure}</div>`:''}
      ${p.location?`<div style="font-size:12px;color:#888;margin:4px 0">📍 ${p.location}</div>`:''}

      <div class="action-bar">
        <div class="action-btn ${p.liked?'liked':''}" onclick="toggleLike(${i})">
          ${p.liked?'❤️':'🤍'} ${p.likes}

        <div class="action-btn">↗️ 分享</div>

}

function toggleLike(i){
  const p = state.posts[i];
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  saveState();
  renderCommunity();
}

let currentCat = 'all';

function renderFishbook(){
  // 进度
  const unlocked = Object.values(state.collection).filter(c=>c.unlocked).length;
  const total = FISH_DB.length;
  document.getElementById('progress-fill').style.width = (unlocked/total*100)+'%';
  document.getElementById('progress-text').textContent = `已解锁 ${unlocked} / ${total} 种`;
  // 分类Tab
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = CATS.map(c=>`
    <div class="cat-tab ${currentCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.name}</div>
  `).join('');

  // 鱼格
  const fish = currentCat==='all' ? FISH_DB : FISH_DB.filter(f=>f.cat===currentCat);
  const grid = document.getElementById('fish-grid');
  grid.innerHTML = fish.map(f=>{
    const col = state.collection[f.id]||{unlocked:false,level:0};
    const lv = col.level;
    const locked = !col.unlocked;
    const gradeLabel = locked ? '' : ['','B','A','S','SSS'][lv];
    const gradeColor = locked ? '' : LEVEL_COLORS[lv];
    return '<div class="fish-card '+(locked?'locked':'unlocked lv'+lv)+'" onclick="openFishModal(\''+f.id+'\')">'+
      (locked?'<span class="lock-overlay">🔒</span>':'')+
      '<span class="fish-icon" style="'+(locked?'filter:grayscale(1) brightness(.3)':'')+'">'+f.icon+'</span>'+
      '<div class="fish-name" style="'+(locked?'color:#444':'')+'">'+f.name+'</div>'+
      (lv>0?'<span class="grade-pill" style="color:'+gradeColor+';border-color:'+gradeColor+'">'+gradeLabel+'</span>':'')+
      '</div>';
  }).join('');
}

function setCat(cat){
  currentCat = cat;
  renderFishbook();
}

function openFishModal(id){
  const f = getFish(id);
  if(!f) return;
  const col = state.collection[id]||{unlocked:false,level:0,bestLen:0,bestWt:0};
  const lv = col.level;
  const locked = !col.unlocked;
  // 级别定义: index 0=占位, 1=首次/X灰, 2=B蓝, 3=A紫红, 4=S金, 5=SSS白金
  // 评级: 0=未解锁X, 1=B, 2=A, 3=S, 4=SSS
  const GRADES = [
    {label:'X',   color:'#555',   bg:'#111',    desc:'未解锁',  cond:'未钓获此鱼'},
    {label:'B',   color:'#2979FF',bg:'#0a1929', desc:'良品',    cond:'< '+f.t.lv2+' cm（幼年期）'},
    {label:'A',   color:'#E91E8C',bg:'#1a0015', desc:'精品',    cond:'>= '+f.t.lv2+' cm'},
    {label:'S',   color:'#FFD600',bg:'#1a1400', desc:'史诗',    cond:'>= '+f.t.lv3+' cm'},
    {label:'SSS', color:'#E0F7FA',bg:'#001519', desc:'白金传说',cond:'>= '+f.t.lv4+' cm（成年巨型）'},
  ];
  const curGrade = locked ? GRADES[0] : GRADES[Math.min(lv,4)];
  const catchCount = (col.catches||[]).length;
  const bestLen = col.bestLen||0;
  const bestWt  = col.bestWt||0;

  // 分布tag
  const distHtml = (f.dist && f.dist!=='分布信息待完善')
    ? f.dist.split(/[，,]/).map(d=>'<span class="dist-tag">'+d.trim()+'</span>').join('')
    : '<span class="dist-tag dist-todo">待完善</span>';

  // 钓法tag
  const lureHtml = (f.lure||'—').split('/').map(l=>'<span class="lure-tag">'+l.trim()+'</span>').join('');

  // 评级行
  const gradeRows = GRADES.slice(1).map(function(g,i){
    const lvIdx = i+1;
    const reached = !locked && lv>=lvIdx;
    return '<div class="detail-grade-row'+(reached?' grade-reached':'')+'" style="border-color:'+(reached?g.color:'#2a2a2a')+'">'
      +'<div class="grade-badge" style="background:'+(reached?g.bg:'#111')+';color:'+(reached?g.color:'#444')+';border:1.5px solid '+(reached?g.color:'#333')+'">'+g.label+'</div>'
      +'<div class="grade-info"><div class="grade-name" style="color:'+(reached?g.color:'#555')+'">'+g.desc+'</div>'
      +'<div class="grade-cond" style="color:'+(reached?'#aaa':'#444')+'">'+g.cond+'</div></div>'
      +(reached?'<div class="grade-check" style="color:'+g.color+'">✓</div>':'<div class="grade-lock" style="color:#333">—</div>')
      +'</div>';
  }).join('');

  const headerFilter = locked ? 'filter:grayscale(.9) brightness(.4)' : '';

  document.getElementById('fish-modal-content').innerHTML =
    '<div class="detail-header" style="'+headerFilter+'">'
      +'<div class="detail-icon">'+f.icon+'</div>'
      +'<div class="detail-names">'
        +'<div class="detail-name">'+f.name+'</div>'
        +'<div class="detail-en">'+f.en+'</div>'
      +'</div>'
      +'<div class="detail-cur-grade" style="background:'+curGrade.bg+';color:'+curGrade.color+';border:2px solid '+curGrade.color+'">'
        +(locked?'🔒':curGrade.label)
      +'</div>'
    +'</div>'

    +'<div class="detail-meta-row">'
      +'<div class="detail-meta-item"><div class="meta-label">分类</div><div class="meta-val">'
        +{fresh:'🎣 淡水',salt:'🌊 海水',sea:'⚓ 远洋'}[f.cat]+'</div></div>'
      +'<div class="detail-meta-item"><div class="meta-label">稀有度</div><div class="meta-val" style="color:'+RARITY[f.r].color+'">'+RARITY[f.r].name+'</div></div>'
      +'<div class="detail-meta-item"><div class="meta-label">钓获次数</div><div class="meta-val">'+(locked?'—':catchCount+' 次')+'</div></div>'
    +'</div>'

    +(!locked && bestLen ? '<div class="detail-best"><span class="best-label">📏 最大记录</span>'
      +'<span class="best-val" style="color:'+curGrade.color+'">'+bestLen+' cm'+(bestWt?' · '+bestWt+' kg':'')+'</span></div>' : '')

    +'<div class="detail-section"><div class="detail-stitle">📖 鱼种简介</div>'
      +'<div class="detail-desc">'+(f.desc||'暂无简介，期待你的首次钓获！')+'</div></div>'

    +'<div class="detail-section"><div class="detail-stitle">📏 常规尺寸</div>'
      +'<div class="detail-desc">'+(f.size||'暂无数据')+'</div></div>'

    +'<div class="detail-section"><div class="detail-stitle">🌍 全球分布</div>'
      +'<div class="detail-dist">'+distHtml+'</div></div>'

    +'<div class="detail-section"><div class="detail-stitle">🎣 推荐钓法</div>'
      +'<div class="detail-lure-tags">'+lureHtml+'</div></div>'

    +'<div class="detail-section"><div class="detail-stitle">🏅 图鉴评级</div>'
      +'<div class="detail-grade-hint">首次钓获即根据体长评级，体长越大评级越高</div>'
      +'<div class="detail-grades">'+gradeRows+'</div></div>'

    +'<button class="modal-close-btn" onclick="closeFishModal()">关闭</button>';

  document.getElementById('fish-modal').classList.add('open');
}
function closeFishModal(e){
  if(!e || e.target===document.getElementById('fish-modal')) document.getElementById('fish-modal').classList.remove('open');
}

function renderFishDropdownList(query){
  const list = document.getElementById('fish-dropdown-list');
  const q = query.trim().toLowerCase();
  const confMap = window._aiConfMap || {};
  let filtered = q
    ? FISH_SORTED.filter(f=>f.name.includes(query)||f.en.toLowerCase().includes(q))
    : FISH_SORTED;

  if(!filtered.length){
    list.innerHTML='<div class="fish-dd-empty">无匹配结果</div>';
    return;
  }

  if(q && Object.keys(confMap).length){
    filtered = [...filtered].sort((a,b)=>(confMap[b.id]||0)-(confMap[a.id]||0));
  }

  let lastLetter = '';
  let html2 = '';
  filtered.forEach(f=>{
    const letter = f.en[0].toUpperCase();
    if(!q && letter!==lastLetter){
      html2 += '<div class="fish-dd-letter">'+letter+'</div>';
      lastLetter = letter;
    }
    const isSelected = selectedFishId===f.id;
    const conf = confMap[f.id] || 0;
    const confColor = conf>=80?'#4CAF50':conf>=50?'#FFD600':'#aaa';
    const confTag = conf>0
      ? '<span class="fish-dd-conf-tag" style="color:'+confColor+'">'+conf+'%</span>'
      : '';
    html2 += '<div class="fish-dd-item'+(isSelected?' fish-dd-selected':'')+' " data-fid="'+f.id+'" onclick="selectFish(this.dataset.fid)">'
      +'<span class="fish-dd-icon">'+f.icon+'</span>'
      +'<div class="fish-dd-names">'
        +'<span class="fish-dd-cn">'+f.name+'</span>'
        +'<span class="fish-dd-en">'+f.en+'</span>'
      +'</div>'
      +confTag
      +(conf<=0?'<span class="fish-dd-cat" style="color:'+CAT_COLOR[f.cat]+'">'+CAT_BADGE[f.cat]+'</span>':'')
      +(isSelected?'<span class="fish-dd-check">✓</span>':'')
    +'</div>';
  });
  list.innerHTML = html2;
}

  };
  reader.readAsDataURL(file);
}

// 图片压缩：maxPx 限制长边像素，quality JPEG 质量
function compressImage(dataUrl, maxPx, quality, callback){
  var img = new Image();
  img.onload = function(){
    var w = img.width, h = img.height;
    if(w > maxPx || h > maxPx){
      if(w > h){ h = Math.round(h * maxPx / w); w = maxPx; }
      else { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = function(){ callback(dataUrl); }; // 失败则用原图
  img.src = dataUrl;
}

// 新架构：提交图片给服务端识别，GET轮询结果（绕开 serveo POST 502 限制）
function callVisionAPI(base64Data, prompt){
  // 步骤1：POST /api/recognize 提交图片，获取 taskId
  var recognizeUrl = window.location.origin + '/api/recognize';
  var resultUrl    = window.location.origin + '/api/recog-result';
  console.log('[recog:'+window.APP_VERSION+'] 提交识别任务到', recognizeUrl, '图片大小:', Math.round(base64Data.length/1024)+'KB');

  return fetch(recognizeUrl, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image: base64Data })
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error('submit '+r.status+': '+t.slice(0,100)); });
    return r.json();
  }).then(function(data){
    var taskId = data.taskId;
    console.log('[recog] 任务已提交, taskId:', taskId, '开始轮询...');
    // 步骤2：轮询 /api/recog-result?id=taskId
    return pollRecogResult(resultUrl, taskId, 0);
  });
}

// 轮询识别结果（每1.5秒一次，最多30次=45秒）
function pollRecogResult(resultUrl, taskId, attempt){
  if(attempt > 30) throw new Error('识别超时，请重试');
  return new Promise(function(resolve, reject){
    setTimeout(function(){
      fetch(resultUrl + '?id=' + taskId)
        .then(function(r){ return r.json(); })
        .then(function(task){
          console.log('[poll] attempt', attempt, 'status:', task.status);
          if(task.status === 'done'){ resolve(task.result); }
          else if(task.status === 'error'){ reject(new Error(task.error || '识别失败')); }
          else { pollRecogResult(resultUrl, taskId, attempt+1).then(resolve).catch(reject); }
        })
        .catch(function(e){ reject(e); });
    }, attempt === 0 ? 1000 : 1500);
  });
}

function showRecogResult(result){
  // 隐藏状态条
  var bar = document.getElementById('ai-status-bar');
  if(bar) bar.style.display='none';

  var suggestBox   = document.getElementById('fish-ai-suggest');
  var suggestList  = document.getElementById('fish-ai-suggest-list');
  var suggestTitle = document.getElementById('fish-ai-suggest-status');

  if(!result){ return; }  // null = 无API Key，静默
  if(!result.top_matches||!result.top_matches.length){
    if(suggestTitle) suggestTitle.textContent = '🤖 AI 未能识别，请手动搜索';
    if(suggestBox)   suggestBox.style.display = 'block';
    if(suggestList)  suggestList.innerHTML = '';
    renderSizeEstimate(result.size_estimate);
    return;
  }

  var matches = result.top_matches.map(function(m){
    var dbFish = FISH_DB.find(function(f){ return f.id===m.id; })
      || FISH_DB.find(function(f){ return f.en.toLowerCase()===(m.en||'').toLowerCase(); })
      || FISH_DB.find(function(f){ return f.name===m.name; });
    return Object.assign({},m,{dbFish:dbFish});
  }).filter(function(m){ return m.dbFish; });

  if(!matches.length){
    if(suggestTitle) suggestTitle.textContent = '🤖 AI 未匹配到已知鱼种';
    if(suggestBox)   suggestBox.style.display = 'block';
    if(suggestList)  suggestList.innerHTML = '';
    renderSizeEstimate(result.size_estimate);
    return;
  }

  // 写入全局匹配度表，供 renderFishDropdownList 使用
  window._aiConfMap = {};
  matches.forEach(function(m){ if(m.dbFish) window._aiConfMap[m.dbFish.id] = m.confidence||0; });
  // 刷新下拉列表以显示百分比
  var curSearch = document.getElementById('fish-search-input');
  if(curSearch) renderFishDropdownList(curSearch.value||'');

  // 注入推荐列表到下拉顶部
  var topConf = matches[0].confidence || 0;
  var titleText = topConf >= 70
    ? ('🤖 AI 推荐（' + topConf + '% 匹配）')
    : '🤖 AI 候选（请确认）';
  if(suggestTitle) suggestTitle.textContent = titleText;

  suggestList.innerHTML = matches.map(function(m){
    var f = m.dbFish;
    var conf = m.confidence || 0;
    var confColor = conf>=80?'#4CAF50':conf>=50?'#FFD600':'#888';
    return '<div class="fish-dd-item fish-ai-item" data-fid="' + f.id + '" onclick="_aiApply(this)">'
      + '<span class="fish-dd-icon">' + f.icon + '</span>'
      + '<div class="fish-dd-names">'
        + '<span class="fish-dd-cn">' + f.name + '</span>'
        + '<span class="fish-dd-en">' + f.en + (m.reason ? ' · ' + m.reason : '') + '</span>'
      + '</div>'
      + (conf > 0 ? '<span class="fish-ai-conf" style="color:' + confColor + '">' + conf + '%</span>' : '')
    + '</div>';
  }).join('');

  suggestBox.style.display = 'block';

  // 高置信自动选中最佳鱼种（更新顶栏显示，保持下拉打开显示推荐列表）
  if(topConf >= 50 && matches[0].dbFish){
    selectFishSilent(matches[0].dbFish.id);
  }

  // 重量推算：根据识别鱼种 + 估算体长，用体型系数推算
  var se = result.size_estimate ? Object.assign({}, result.size_estimate) : null;
  if(se && se.estimated_length && matches.length){
    var topFish = matches[0].dbFish;
    var estLen = se.estimated_length;
    var estWt = estimateWeightByLength(topFish, estLen);
    if(estWt){ se.estimated_weight = estWt; }
  }

  // ✅ 自动填入体长/体重输入框（置信度 >= 50% 时）
  if(se && topConf >= 50){
    var lenInput = document.getElementById('input-length');
    var wtInput  = document.getElementById('input-weight');
    if(se.estimated_length && lenInput && !lenInput.value){
      lenInput.value = se.estimated_length;
    }
    if(se.estimated_weight && wtInput && !wtInput.value){
      wtInput.value = se.estimated_weight;
    }
  }

  renderSizeEstimate(se);
}


function estimateWeightByLength(fish, lengthCm){
  // W(g) = a * L(cm)^b  (FishBase 系数，结果单位 g，除以1000转 kg)
  var L = lengthCm;
  if(!L || L<=0) return null;

  // [a, b] 系数来源 FishBase，W单位=克
  var coeffs = {
    // 淡水路亚
    'bass_largemouth': [0.0115, 3.059],   // 35cm≈0.6kg 50cm≈1.8kg
    'bass_smallmouth': [0.0085, 3.107],   // 35cm≈0.5kg
    'pike':            [0.0095, 2.921],   // 70cm≈2.0kg
    'snakehead':       [0.0160, 2.970],   // 50cm≈1.8kg
    'mandarin_fish':   [0.0210, 3.040],   // 30cm≈0.5kg
    'perch_euro':      [0.0130, 3.063],   // 30cm≈0.5kg
    'catfish_channel': [0.0071, 3.162],   // 50cm≈1.5kg
    'rainbow_trout':   [0.0110, 3.024],   // 40cm≈0.8kg
    'brown_trout':     [0.0100, 3.048],   // 40cm≈0.7kg
    'taimen':          [0.0073, 3.120],   // 80cm≈3.5kg
    'asp':             [0.0075, 3.090],   // 50cm≈1.1kg
    'zander':          [0.0078, 3.058],   // 50cm≈1.2kg
    'wels_catfish':    [0.0035, 3.210],   // 100cm≈5kg
    // 海水路亚
    'gt':              [0.0180, 3.050],   // 80cm≈8kg
    'barramundi':      [0.0120, 2.980],   // 60cm≈2.5kg
    'roosterfish':     [0.0150, 3.010],   // 70cm≈4kg
    'yellowfin_tuna':  [0.0250, 3.000],   // 100cm≈25kg
    'bluefin_tuna':    [0.0310, 3.010],   // 150cm≈100kg
    'mahi_mahi':       [0.0120, 3.060],   // 80cm≈7kg
    'sailfish':        [0.0062, 3.080],   // 150cm≈18kg
    'marlin_blue':     [0.0095, 3.140],   // 200cm≈80kg
    'snapper_red':     [0.0150, 3.040],   // 50cm≈2kg
    'grouper_giant':   [0.0190, 3.060],   // 80cm≈10kg
  };
  var c = coeffs[fish && fish.id] || [0.0100, 3.050]; // 通用默认
  var wt_g = c[0] * Math.pow(L, c[1]);
  var wt_kg = wt_g / 1000;
  // 合理范围截断（避免异常值）
  if(wt_kg < 0.01) wt_kg = 0.01;
  if(wt_kg > 500)  wt_kg = 500;
  return Math.round(wt_kg * 10) / 10;
}

function renderSizeEstimate(se){
  // 移除旧的估算卡片
  var old = document.getElementById('ai-size-card');
  if(old) old.parentNode.removeChild(old);
  if(!se) return;

  var confColor = se.confidence==='high'?'#4CAF50':se.confidence==='medium'?'#FFD600':'#888';
  var confLabel = se.confidence==='high'?'高':'medium'===se.confidence?'中':'低';
  var refIcon = se.has_reference ? '📏' : '👁️';
  var card = document.createElement('div');
  card.id = 'ai-size-card';
  card.className = 'ai-size-card';
  card.innerHTML =
    '<div class="ai-size-header">'
      +'<span class="ai-size-icon">'+refIcon+'</span>'
      +'<span class="ai-size-label">AI 体长估算</span>'
      +'<span class="ai-size-conf" style="color:'+confColor+'">置信度：'+confLabel+'</span>'
    +'</div>'
    +'<div class="ai-size-main">'
      +(se.estimated_length
        ? '<span class="ai-size-num">~'+se.estimated_length+'</span><span class="ai-size-unit">cm</span>'
          +(se.length_range&&se.length_range!==String(se.estimated_length) ? '<span class="ai-size-range">（'+se.length_range+' cm）</span>' : '')
        : '<span class="ai-size-na">无法估算</span>')
    +'</div>'
    +'<div class="ai-size-method">'
      +(se.reference_object&&se.reference_object!=='无' ? '参照物：'+se.reference_object+'　' : '')
      +(se.method||'')
    +'</div>'
    +(se.estimated_weight

      ? '<div class="ai-size-apply-row"><button class="ai-size-apply-btn" onclick="applyEstimatedLength('+se.estimated_length+')">填入体长</button></div>'

// GPS定位
function getLocation(){
  const btn = document.getElementById('locate-btn');
  const status = document.getElementById('location-status');
  if(!navigator.geolocation){
    status.textContent = '⚠️ 当前浏览器不支持定位';
    status.style.color = '#f66';
    return;
  }
  btn.textContent = '⏳';
  btn.disabled = true;
  status.textContent = '定位中...';
  status.style.color = '#888';

  navigator.geolocation.getCurrentPosition(
    function(pos){
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      window._catchCoords = {lat, lng};
      btn.textContent = '✅';
      btn.disabled = false;
      status.textContent = '';
      document.getElementById('coords-display').textContent = lat + ', ' + lng;
      document.getElementById('share-location-row').style.display = 'flex';
      document.getElementById('share-location-tip').style.display = 'block';
      // 反查地名（仅展示，不强制）
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&accept-language=zh')
        .then(r=>r.json())
        .then(d=>{
          if(d&&d.display_name){
            const parts = d.display_name.split(',');
            const name = parts.slice(0,3).join(' ').trim();
            document.getElementById('input-location').value = name;
          }
        }).catch(()=>{});
    },
    function(err){
      btn.textContent = '📍';
      btn.disabled = false;
      const msgs = {1:"用户拒绝授权（请确保使用 HTTPS 或授权定位权限）",2:'用户拒绝授权',2:'无法获取位置',3:'定位超时'};
      console.warn("location error", err.code, err.message);
      status.textContent = '❌ 定位失败：' + (msgs[err.code]||'未知错误');
      status.style.color = '#f66';
    },
    {timeout:10000, enableHighAccuracy:true}
  );
}

function onShareCoordsToggle(cb){
  const tip = document.getElementById('share-location-tip');
  tip.style.display = 'block';
  if(cb.checked){
    tip.textContent = '✅ 将附带精确坐标到广场帖子（其他人可看到钓点位置）';
    tip.style.color = '#4CAF50';
  } else {
    tip.textContent = '⚠️ 精确坐标不会对外分享，仅记录地名';
    tip.style.color = '#888';
  }
}

// Toast 提示
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.className='toast',2000);
}


// ===================================================================
// 解锁动画
// ===================================================================
function showUnlock(fish, isFirst, levelUp, newLevel, oldLevel){
  const GRADE_CONFIGS = {
    1: {label:'B', color:'#2979FF', shadow:'#2979FF88', title:'首次解锁！', bg:'linear-gradient(135deg,#0a1929,#0d2a4a)'},
    2: {label:'A', color:'#E91E8C', shadow:'#E91E8C88', title:'首次解锁！', bg:'linear-gradient(135deg,#1a0015,#2d0025)'},
    3: {label:'S', color:'#FFD600', shadow:'#FFD60088', title:'首次解锁！', bg:'linear-gradient(135deg,#1a1400,#2d2200)'},
    4: {label:'SSS',color:'#E0F7FA', shadow:'#E0F7FA88', title:'首次解锁！', bg:'linear-gradient(135deg,#001519,#002530)'},
  };
  const cfg = GRADE_CONFIGS[newLevel] || GRADE_CONFIGS[1];
  const card = document.getElementById('unlock-card');
  const ring = document.getElementById('unlock-grade-ring');
  const gradeLabel = document.getElementById('unlock-grade-label');
  const titleEl = document.getElementById('unlock-title');
  const fishNameEl = document.getElementById('unlock-fish-name');
  const sizeRowEl = document.getElementById('unlock-size-row');
  const gradeDescEl = document.getElementById('unlock-grade-desc');
  const closeBtn = document.getElementById('unlock-close-btn');

  // 应用评级主题色
  card.style.background = cfg.bg;
  card.style.border = '2px solid ' + cfg.color + '55';
  ring.style.borderColor = cfg.color;
  ring.style.boxShadow = '0 0 20px ' + cfg.shadow + ', inset 0 0 12px ' + cfg.shadow;
  gradeLabel.style.color = cfg.color;
  gradeLabel.textContent = cfg.label;
  closeBtn.style.background = cfg.color + '22';
  closeBtn.style.color = cfg.color;
  closeBtn.style.borderColor = cfg.color + '55';

  document.getElementById('unlock-icon').textContent = fish.icon;

  if(isFirst){
    titleEl.textContent = '🎣 图鉴解锁！';
    fishNameEl.textContent = fish.name;
    fishNameEl.style.color = cfg.color;
    const gradeNames = {1:'良品',2:'精品',3:'史诗',4:'白金传说'};
    gradeDescEl.textContent = '初始评级 · ' + (gradeNames[newLevel]||'良品');
    gradeDescEl.style.color = cfg.color;
  } else if(levelUp){
    const gradeNames = ['','B 良品','A 精品','S 史诗','SSS 白金传说'];
    titleEl.textContent = '⬆️ 评级提升！';
    fishNameEl.textContent = fish.name;
    fishNameEl.style.color = cfg.color;
    gradeDescEl.textContent = gradeNames[oldLevel] + '  →  ' + gradeNames[newLevel];
    gradeDescEl.style.color = cfg.color;
  } else {
    titleEl.textContent = '✅ 渔获记录';
    fishNameEl.textContent = fish.name;
    fishNameEl.style.color = '#aaa';
    gradeDescEl.textContent = ['','B 良品','A 精品','S 史诗','SSS 白金传说'][newLevel] || '';
    gradeDescEl.style.color = cfg.color;
  }

  // 当前钓获尺寸
  const len = state.lastCatchLen || 0;
  const wt  = state.lastCatchWt  || 0;
  sizeRowEl.textContent = len ? (len + ' cm' + (wt ? '  ·  ' + wt + ' kg' : '')) : '';
  sizeRowEl.style.color = '#aaa';

  spawnParticles(cfg.color);
  document.getElementById('unlock-overlay').classList.add('show');
}
function spawnParticles(accentColor){
  const container = document.getElementById('particles');
  container.innerHTML = '';
  const base = accentColor || '#00d4ff';
  const colors = [base, '#ffffff', base, '#ffffffcc', base, '#fff', base];
  for(let i=0;i<24;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 5+Math.random()*8;
    const x = Math.random()*300-150;
    const delay = Math.random()*0.4;
    p.style.cssText = 'width:'+size+'px;height:'+size+'px;'
      +'background:'+colors[Math.floor(Math.random()*colors.length)]+';'
      +'left:calc(50% + '+x+'px);bottom:30%;'
      +'animation-delay:'+delay+'s;'
      +'animation-duration:'+(0.8+Math.random()*0.6)+'s;'
      +'transform:translateX('+( Math.random()*60-30)+'px)';
    container.appendChild(p);
  }
}
function closeUnlock(){
  document.getElementById('unlock-overlay').classList.remove('show');
}

function renderProfile(){
  const unlocked = Object.values(state.collection).filter(c=>c.unlocked).length;
  const legendary = Object.values(state.collection).filter(c=>c.level===4).length;
  const bestLen = state.records.reduce((m,r)=>Math.max(m,r.length||0),0);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-block"><span class="stat-num">${state.records.length}</span><div class="stat-label">总渔获</div></div>
    <div class="stat-block"><span class="stat-num">${unlocked}</span><div class="stat-label">解锁鱼种</div></div>
    <div class="stat-block"><span class="stat-num">${legendary}</span><div class="stat-label">传说达成</div></div>
    <div class="stat-block"><span class="stat-num">${bestLen||'--'}<small>${bestLen?'cm':''}</small></span><div class="stat-label">最大体长</div></div>`;

  const list = document.getElementById('record-list');
  if(!state.records.length){list.innerHTML='<div class="empty-tip">去记录你的第一条渔获吧 🎣</div>';return;}
  list.innerHTML = state.records.slice(0,15).map(r=>`
    <div class="record-list-item">
      <div class="rli-left">
        <div class="rli-fish">${getFish(r.fishId)?.icon||'🐟'} ${r.fishName}</div>
        <div class="rli-detail">${r.length?r.length+'cm':''} ${r.weight?r.weight+'kg':''} ${r.location?'📍'+r.location:''} · ${timeAgo(r.ts)}</div>
      </div>
      <div class="rli-level" style="color:${LEVEL_COLORS[r.level]}">${LEVEL_NAMES[r.level]}</div>
    </div>`).join('');
}

function openFishPicker2(){
  var dd = document.getElementById('fish-dropdown2');
  var arrow = document.getElementById('fish-select-arrow2');
  if(!dd) return;
  var isOpen = dd.style.display !== 'none';
  if(isOpen){ dd.style.display='none'; arrow.style.transform=''; }
  else {
    dd.style.display='flex';
    arrow.style.transform='rotate(180deg)';
    document.getElementById('fish-search-input2').value='';
    renderFishDropdownList2('');
    setTimeout(function(){ document.getElementById('fish-search-input2').focus(); },50);
  }
}
function renderFishDropdownList2(query){
  var list = document.getElementById('fish-dropdown-list2');
  if(!list) return;
  var q = query.trim().toLowerCase();
  var filtered = q ? FISH_SORTED.filter(function(f){ return f.name.includes(query)||f.en.toLowerCase().includes(q); }) : FISH_SORTED;
  if(!filtered.length){ list.innerHTML='<div class="fish-dd-empty">无匹配结果</div>'; return; }
  var lastLetter='', html2='';
  filtered.forEach(function(f){
    var letter = f.en[0].toUpperCase();
    if(!q && letter!==lastLetter){ html2+='<div class="fish-dd-letter">'+letter+'</div>'; lastLetter=letter; }
    var isSel = selectedFishId===f.id;
    html2+='<div class="fish-dd-item'+(isSel?' fish-dd-selected':'')+'" data-fid2="'+ f.id +'" onclick="_aiApply2(this)">'
      +'<span class="fish-dd-icon">'+f.icon+'</span>'
      +'<div class="fish-dd-names"><span class="fish-dd-cn">'+f.name+'</span><span class="fish-dd-en">'+f.en+'</span></div>'
      +'<span class="fish-dd-cat" style="color:'+CAT_COLOR[f.cat]+'">'+CAT_BADGE[f.cat]+'</span>'
      +(isSel?'<span class="fish-dd-check">✓</span>':'')+'</div>';
  });
  list.innerHTML = html2;
}
function filterFishList2(val){ renderFishDropdownList2(val); }
function selectFish2(id){
  selectedFishId = id;
  var fish = getFish(id);
  var val = document.getElementById('fish-select-val2');
  if(fish && val){
    val.innerHTML='<span class="fish-select-icon">'+fish.icon+'</span>'
      +'<span class="fish-select-name">'+fish.name+'</span>'
      +'<span class="fish-select-en">'+fish.en+'</span>';
  }
  document.getElementById('fish-dropdown2').style.display='none';
  document.getElementById('fish-select-arrow2').style.transform='';
  // 同时更新主 selectFish 显示
  selectFish(id);
  showToast('✅ 已选择：'+(fish?fish.name:''));
}
document.addEventListener('click', function(e){
  var wrap2 = document.getElementById('fish-select-wrap2');
